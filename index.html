<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 小博士 · 智能教学助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --font-zh: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-num: "Nunito", "Noto Sans SC", sans-serif;

    --ease-out: cubic-bezier(.22, 1, .36, 1);

    --brand: #2f73e0;
    --brand-deep: color-mix(in oklab, var(--brand), oklch(0.3 0.09 265) 30%);
    --brand-bright: color-mix(in oklab, var(--brand), #ffffff 14%);
    --brand-grad: linear-gradient(180deg, var(--brand-bright), var(--brand) 52%, color-mix(in oklab, var(--brand), oklch(0.35 0.12 265) 20%));
    --brand-soft: color-mix(in oklab, var(--brand), var(--surface) 90%);
    --brand-soft-border: color-mix(in oklab, var(--brand), var(--surface) 70%);
    --brand-glow: color-mix(in oklab, var(--brand), transparent 46%);

    --accent: oklch(0.7 0.16 42);

    --canvas: oklch(0.983 0.001 250);
    --surface: #ffffff;
    --surface-2: oklch(0.967 0.0018 250);
    --ink: oklch(0.26 0.008 260);
    --ink-2: oklch(0.46 0.006 256);
    --ink-3: oklch(0.62 0.005 252);
    --line: oklch(0.925 0.0022 250);

    --auth-bg: oklch(0.972 0.022 80);
    --auth-ink: oklch(0.54 0.1 68);
    --auth-border: oklch(0.9 0.045 78);

    --intent-bg: oklch(0.971 0.0015 250);
    --input-border: oklch(0.913 0.003 250);
    --input-shadow: 0 1px 2px oklch(0.4 0.06 260 / .05), 0 10px 28px -14px color-mix(in oklab, var(--brand), transparent 72%), 0 26px 64px -38px oklch(0.35 0.08 260 / .5);
    --ring: 0 0 0 4px color-mix(in oklab, var(--brand), transparent 85%);
    --shadow-card: 0 1px 2px oklch(0.4 0.05 260 / .05), 0 14px 36px -26px oklch(0.35 0.07 260 / .55);
  }

  .dark {
    --brand-deep: color-mix(in oklab, var(--brand), #ffffff 22%);
    --brand-bright: color-mix(in oklab, var(--brand), #ffffff 18%);
    --brand-grad: linear-gradient(180deg, var(--brand-bright), var(--brand) 60%, color-mix(in oklab, var(--brand), oklch(0.3 0.1 265) 18%));
    --brand-soft: color-mix(in oklab, var(--brand), var(--surface) 84%);
    --brand-soft-border: color-mix(in oklab, var(--brand), var(--surface) 60%);

    --canvas: oklch(0.21 0.012 260);
    --surface: oklch(0.255 0.014 260);
    --surface-2: oklch(0.29 0.015 260);
    --ink: oklch(0.93 0.01 250);
    --ink-2: oklch(0.78 0.012 250);
    --ink-3: oklch(0.6 0.012 250);
    --line: oklch(0.36 0.014 260);

    --auth-bg: oklch(0.32 0.04 70);
    --auth-ink: oklch(0.82 0.08 72);
    --auth-border: oklch(0.42 0.05 70);

    --intent-bg: oklch(0.18 0.012 260);
    --input-border: oklch(0.38 0.015 260);
    --input-shadow: 0 1px 2px rgba(0,0,0,.3), 0 18px 50px -28px rgba(0, 0, 0, 0.7);
    --ring: 0 0 0 4px color-mix(in oklab, var(--brand), transparent 75%);
    --shadow-card: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -28px rgba(0,0,0,.8);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-zh);
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    transition: background .3s ease, color .3s ease;
  }
  #root { min-height: 100vh; position: relative; z-index: 1; }
  /* quiet atmosphere behind transparent shells — a breath of brand light, nothing loud */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1200px 620px at 50% -200px, color-mix(in oklab, var(--brand), transparent 96%), transparent 72%),
      radial-gradient(820px 520px at -8% 102%, oklch(0.94 0.008 220 / .12), transparent 70%);
  }
  .dark body::before, body.dark::before { opacity: .5; }
  ::selection { background: color-mix(in oklab, var(--brand), transparent 78%); }
  textarea::placeholder { color: var(--ink-3); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--ink-3), transparent 55%); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in oklab, var(--ink-3), transparent 30%); background-clip: padding-box; }

  /* striped placeholder */
  .ph-stripe {
    background-color: var(--surface-2);
    background-image: repeating-linear-gradient(135deg, transparent, transparent 7px, color-mix(in oklab, var(--ink-3), transparent 88%) 7px, color-mix(in oklab, var(--ink-3), transparent 88%) 8px);
    border: 1px solid var(--line);
  }

  /* ---- animations ---- */
  @keyframes bobDot { 0%, 80%, 100% { transform: scale(0.5); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes skelPulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  .skeleton-row { animation: skelPulse 1.3s ease-in-out infinite; }
  @keyframes popIn { from { opacity: 0; transform: scale(0.94) translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes entPop { from { opacity: 0; transform: translateY(6px) scale(.9); } to { opacity: 1; transform: none; } }
  @keyframes ring { 0% { transform: scale(1); opacity: .5; } 100% { transform: scale(1.7); opacity: 0; } }
  @keyframes pulseBg { 0% { background: var(--brand-soft); } 100% { background: transparent; } }
  @keyframes drawerIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .drawer-pop { animation: drawerIn .3s ease both; }

  .home-fade { animation: fadeUp .55s var(--ease-out) both; }
  .chip-pop { animation: fadeUp .5s var(--ease-out) both; }
  .intent-card { animation: popIn .5s var(--ease-out) both; }
  .ent-pop { animation: entPop .4s var(--ease-out) both; }
  .match-pop { animation: popIn .45s var(--ease-out) both; }
  .enter-pop { animation: fadeUp .45s var(--ease-out) both; }
  .sug-pop { animation: entPop .35s var(--ease-out) both; }
  .trace-pop { animation: fadeUp .35s var(--ease-out) both; }
  .cite-pop { animation: fadeUp .45s var(--ease-out) both; }
  .ans-pop { animation: popIn .5s var(--ease-out) both; }
  .block-pop { animation: entPop .45s var(--ease-out) both; }
  .res-card { animation: fadeUp .45s var(--ease-out) both; }
  .results-pulse { animation: pulseBg .6s ease; }
  .bot-ring {
    position: absolute; inset: 0; border-radius: 30% 30% 38% 38%;
    border: 2px solid var(--brand); animation: ring 1.6s ease-out infinite;
  }

  @media (max-width: 860px) {
    .home-fade[style*="grid"] { display: block !important; }
  }

  /* ---- memory card ---- */
  .mem-grid { grid-template-columns: 1.15fr 0.85fr; }
  .mem-left { border-right: 1px solid var(--line); }
  @media (max-width: 720px) {
    .mem-grid { grid-template-columns: 1fr; }
    .mem-left { border-right: none; border-bottom: 1px solid var(--line); }
  }

  /* ---- works library ---- */
  .work-card:hover { transform: translateY(-3px); box-shadow: 0 18px 38px -22px oklch(0.35 0.07 260 / .4); border-color: var(--brand-soft-border); }

  /* ---- example-prompt chips (老师们在问) ---- */
  .ex-chip { transition: transform .18s var(--ease-out), box-shadow .2s, border-color .2s, background .2s; }
  .ex-chip:hover { transform: translateY(-2px); background: var(--surface); border-color: color-mix(in oklab, var(--brand), var(--surface) 45%); box-shadow: 0 8px 20px -10px var(--brand-glow); }

  /* ---- collapsed rail brand → toggle on hover ---- */
  .rbt-avatar { opacity: 1; transition: opacity .15s; }
  .rbt-icon { opacity: 0; transition: opacity .15s; }
  .rail-brand-toggle:hover .rbt-avatar { opacity: 0; }
  .rail-brand-toggle:hover .rbt-icon { opacity: 1; }

  /* ---- hover tooltip bubbles (data-tip) ---- */
  [data-tip] { position: relative; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(-2px);
    background: oklch(0.3 0.01 260 / .96);
    color: #fff;
    font-size: 11.5px;
    font-weight: 600;
    font-family: var(--font-zh);
    line-height: 1;
    padding: 6px 9px;
    border-radius: 7px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .14s ease, transform .14s ease;
    z-index: 300;
  }
  [data-tip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); transition-delay: .3s; }
  [data-tip][data-tip-pos="right"]::after { top: 50%; left: calc(100% + 8px); transform: translateY(-50%) translateX(-2px); }
  [data-tip][data-tip-pos="right"]:hover::after { transform: translateY(-50%) translateX(0); }
  [data-tip][data-tip-pos="bottom-left"]::after { left: 0; transform: translateX(0) translateY(-2px); }
  [data-tip][data-tip-pos="bottom-left"]:hover::after { transform: translateX(0) translateY(0); }

  /* ---- workspace split resizer ---- */
  .ws-resizer { display: flex; align-items: center; justify-content: center; }
  .ws-resizer::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%); width: 2px; background: transparent;
    transition: background .15s;
  }
  .ws-resizer:hover::before, .ws-resizer.dragging::before { background: var(--brand); }
  .ws-resizer-grip {
    position: relative; width: 6px; height: 42px; border-radius: 4px;
    background: var(--surface); border: 1px solid var(--line);
    box-shadow: 0 1px 5px rgba(0,0,0,.14); opacity: 0; transition: opacity .15s;
  }
  .ws-resizer:hover .ws-resizer-grip, .ws-resizer.dragging .ws-resizer-grip { opacity: 1; }

  /* ---- mobile / tablet-portrait base ---- */
  @media (max-width: 900px) {
    /* let fixed-height app shells use the dynamic viewport height on phones */
    body.is-mobile { overflow-x: hidden; }
    /* tame horizontal overflow from wide flex rows */
    .is-mobile #root { overflow-x: hidden; }
  }
  /* drawer (left nav) animation */
  @keyframes navDrawerIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
</style>
</head>
